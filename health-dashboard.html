<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitals — Health Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #eef1f6;
    --panel: #ffffff;
    --panel-soft: #f6f8fb;
    --ink: #12151c;
    --ink-soft: #5c6474;
    --mute: #99a1b3;
    --line: #e4e8f0;
    --blue: #2b5cff;
    --blue-deep: #1a3fc4;
    --blue-mist: #e8effe;
    --coral: #ff5f6d;
    --amber: #ffb547;
    --radius-lg: 26px;
    --radius-md: 18px;
    --radius-sm: 12px;
    --shadow: 0 20px 45px -25px rgba(20, 30, 70, 0.25);
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .app{
    max-width: 1500px;
    margin: 28px auto;
    background: linear-gradient(180deg, #f7f9fc 0%, #eef1f6 100%);
    border-radius: 32px;
    padding: 28px 32px 40px;
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: 76px 1fr 380px;
    gap: 28px;
  }

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    display:flex; flex-direction:column; align-items:center;
    gap: 22px;
    padding-top: 4px;
  }
  .brand{
    width:52px;height:52px;border-radius:16px;
    background:var(--ink);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk';font-weight:700;font-size:20px;
    position:relative;
  }
  .brand::after{
    content:'+'; position:absolute; top:-6px; right:-6px;
    background:var(--blue); color:#fff; width:18px;height:18px;border-radius:50%;
    font-size:12px; display:flex;align-items:center;justify-content:center;
    font-family:'Inter'; font-weight:700;
  }
  .nav{
    display:flex; flex-direction:column; gap:10px;
    background: #fff; padding:10px; border-radius:24px;
    box-shadow: 0 8px 24px -14px rgba(20,30,70,0.18);
  }
  .nav button{
    width:48px;height:48px;border-radius:16px;border:none;
    background:transparent; color:var(--mute);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer; transition: all .2s ease;
  }
  .nav button svg{ width:20px; height:20px; }
  .nav button:hover{ background: var(--blue-mist); color: var(--blue); }
  .nav button.active{ background: var(--blue); color:#fff; box-shadow: 0 10px 20px -8px rgba(43,92,255,0.55); }
  .nav-bottom{ margin-top:auto; display:flex; flex-direction:column; gap:10px; }

  /* ---------- MAIN ---------- */
  .main{ min-width:0; }
  .topbar{
    display:flex; align-items:center; justify-content:flex-end; gap:16px;
    margin-bottom: 26px;
  }
  .search{
    flex:1; max-width: 420px;
    display:flex; align-items:center; gap:10px;
    background:#fff; border-radius:999px; padding: 12px 18px;
    box-shadow: 0 6px 18px -12px rgba(20,30,70,0.2);
    color: var(--mute);
  }
  .search input{ border:none; outline:none; background:transparent; font-size:14px; flex:1; font-family:'Inter'; color: var(--ink); }
  .icon-btn{
    width:44px;height:44px;border-radius:50%;background:#fff;border:none;
    display:flex;align-items:center;justify-content:center; position:relative; cursor:pointer;
    box-shadow: 0 6px 18px -12px rgba(20,30,70,0.2);
  }
  .icon-btn .dot{ position:absolute; top:9px; right:10px; width:8px;height:8px;border-radius:50%; background:var(--coral); border:2px solid #fff; }
  .avatar{
    width:44px;height:44px;border-radius:50%; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, var(--blue), #6a8bff);
    color:#fff; font-family:'Space Grotesk'; font-weight:600; font-size:15px;
    box-shadow: 0 6px 18px -12px rgba(20,30,70,0.2);
  }

  .welcome{
    font-family:'Space Grotesk'; font-weight:700;
    font-size: 34px; letter-spacing: -0.5px;
    margin: 0 0 26px;
  }
  .welcome span{ color: var(--blue); }

  .section-label{
    display:flex; align-items:center; gap:8px;
    font-family:'Space Grotesk'; font-weight:600; font-size:16px;
    margin: 0 0 14px;
    color: var(--ink);
  }
  .section-label::before{ content:''; width:8px;height:8px;border-radius:50%; background:var(--blue); display:inline-block; }

  .cards-row{ display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; margin-bottom: 30px; }
  .card{
    background:#fff; border-radius: var(--radius-lg);
    padding: 18px; box-shadow: 0 14px 30px -22px rgba(20,30,70,0.3);
    display:flex; flex-direction:column; gap:14px;
    border: 1px solid var(--line);
  }
  .card-head{ display:flex; align-items:center; gap:12px; }
  .card-icon{
    width:46px;height:46px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    background: var(--panel-soft); color: var(--ink-soft); flex-shrink:0;
  }
  .card-icon.on{ background: var(--blue); color:#fff; }
  .card-icon svg{ width:22px;height:22px; }
  .card-title{ font-size:13px; color: var(--ink-soft); font-weight:500; }
  .card-pct{ font-family:'Space Grotesk'; font-weight:700; font-size:17px; margin-top:2px; }

  .temp-body{
    background: var(--panel-soft); border-radius: var(--radius-md);
    display:flex; align-items:center; justify-content:space-between;
    padding: 18px 20px; position:relative; overflow:hidden;
  }
  .temp-value{ font-family:'Space Grotesk'; font-weight:700; font-size:26px; z-index:1; }
  .sun-rays{ position:absolute; right:14px; top:50%; transform:translateY(-50%); width:70px; height:70px; opacity:.5; }

  .meter-body{
    background: var(--panel-soft); border-radius: var(--radius-md);
    display:flex; align-items:stretch; overflow:hidden;
  }
  .meter-bars{ flex:1; display:flex; align-items:center; justify-content:space-evenly; padding: 0 14px; gap:5px; }
  .meter-bars .bar{ width:3px; border-radius:4px; background: var(--line); }
  .meter-bars .bar.active{ background: var(--blue); }
  .meter-readout{
    background: var(--blue); color:#fff; min-width:76px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono'; font-weight:600; padding: 12px 0;
  }
  .meter-readout .big{ font-size:19px; }
  .meter-readout .small{ font-size:10px; opacity:.75; }

  .wave-body{
    background: var(--panel-soft); border-radius: var(--radius-md);
    display:flex; align-items:stretch; overflow:hidden;
  }
  .wave-body svg{ flex:1; padding: 10px 6px; }

  /* Heart rate panel */
  .hr-panel{
    background:#fff; border-radius: var(--radius-lg);
    padding: 22px 24px 14px;
    box-shadow: 0 14px 30px -22px rgba(20,30,70,0.3);
    border: 1px solid var(--line);
  }
  .hr-top{ display:flex; align-items:baseline; gap:10px; margin: 4px 0 6px 54px; }
  .hr-value{ font-family:'Space Grotesk'; font-weight:700; font-size:44px; }
  .hr-unit{ color: var(--ink-soft); font-size:13px; font-weight:500; }
  #hrCanvasWrap{ position:relative; }
  #hrTooltip{
    position:absolute; pointer-events:none; background: var(--ink); color:#fff;
    padding:6px 10px; border-radius:10px; font-size:12px; font-family:'IBM Plex Mono';
    transform: translate(-50%,-130%); opacity:0; transition:opacity .12s ease; white-space:nowrap;
    z-index:5;
  }

  /* ---------- RIGHT: 3D PANEL ---------- */
  .body-panel{
    position:relative; border-radius: var(--radius-lg);
    background: radial-gradient(circle at 50% 20%, #ffffff 0%, #eef1f8 65%, #e6ebf5 100%);
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
    overflow:hidden;
    min-height: 640px;
    display:flex; flex-direction:column;
  }
  .body-panel-head{
    display:flex; align-items:center; justify-content:space-between;
    padding: 20px 22px 0;
  }
  .body-panel-head h3{ font-family:'Space Grotesk'; font-size:15px; margin:0; color: var(--ink-soft); font-weight:600; }
  .body-panel-head .tag{
    font-size:11px; color:var(--blue); background:var(--blue-mist); padding:5px 10px; border-radius:999px; font-weight:600;
  }
  #three-container{ flex:1; position:relative; cursor: grab; }
  #three-container:active{ cursor: grabbing; }
  #three-container canvas{ display:block; }

  .hotspot-label{
    position:absolute; transform: translate(-50%,-140%);
    background:#fff; border-radius: 12px; padding:8px 12px;
    font-size:12px; box-shadow: 0 12px 24px -10px rgba(20,30,70,0.4);
    pointer-events:none; opacity:0; transition: opacity .15s ease, transform .15s ease;
    white-space:nowrap; border:1px solid var(--line);
  }
  .hotspot-label b{ font-family:'IBM Plex Mono'; color: var(--blue); }
  .hotspot-label.show{ opacity:1; transform: translate(-50%,-160%); }

  .oxygen-card{
    position:absolute; right:20px; bottom:20px;
    background:#fff; border-radius: var(--radius-md);
    padding: 16px 18px; width: 220px;
    box-shadow: 0 16px 34px -18px rgba(20,30,70,0.4);
    border: 1px solid var(--line);
  }
  .oxygen-top{ display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .oxygen-top span{ font-size:12px; color:var(--ink-soft); display:block; }
  .oxygen-top b{ font-family:'Space Grotesk'; font-size:19px; }
  .oxy-bars{ display:flex; align-items:flex-end; gap:6px; height:34px; }
  .oxy-bars i{ flex:1; background: var(--blue); border-radius:3px; opacity:.85; }

  .drag-hint{
    position:absolute; left:22px; bottom:20px; font-size:11px; color: var(--mute);
    display:flex; align-items:center; gap:6px; background:rgba(255,255,255,.7); padding:6px 10px; border-radius:999px;
    backdrop-filter: blur(4px);
  }

  @media (max-width: 1200px){
    .app{ grid-template-columns: 76px 1fr; }
    .body-panel{ grid-column: 1 / -1; min-height:480px; }
  }
  @media (max-width: 760px){
    .app{ grid-template-columns: 1fr; padding: 18px; margin:10px; border-radius:22px;}
    .sidebar{ display:none; }
    .cards-row{ grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="brand">M</div>
    <div class="nav">
      <button class="active" title="Dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg></button>
      <button title="Heart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-4.35-9.5-8.5C.5 8.5 3 4 7 4c2 0 3.5 1 5 3 1.5-2 3-3 5-3 4 0 6.5 4.5 4.5 8.5C19 16.65 12 21 12 21z"/></svg></button>
      <button title="Messages"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 13a4 4 0 0 0 8 0M9 9h.01M15 9h.01"/></svg></button>
      <button title="Reports"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 3h7l5 5v13H7z"/><path d="M14 3v5h5M9 13h6M9 17h6"/></svg></button>
      <button title="Profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></button>
    </div>
    <div class="nav nav-bottom">
      <button title="History"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg></button>
      <button title="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg></button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" placeholder="Search vitals, records, reports…">
      </div>
      <button class="icon-btn"><span class="dot"></span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      </button>
      <div class="avatar">M</div>
    </div>

    <h1 class="welcome">Welcome Back, <span>Mo</span>!</h1>

    <h2 class="section-label">DashBoard</h2>
    <div class="cards-row">
      <!-- Temperature -->
      <div class="card">
        <div class="card-head">
          <div class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 14.76V4a2 2 0 0 0-4 0v10.76a4 4 0 1 0 4 0z"/></svg></div>
          <div><div class="card-title">Temperature</div><div class="card-pct" id="tempPct">1.6%</div></div>
        </div>
        <div class="temp-body">
          <div class="temp-value" id="tempValue">36.6°</div>
          <svg class="sun-rays" viewBox="0 0 100 100"><g stroke="#c7d0e0" stroke-width="3" stroke-linecap="round">
            <line x1="50" y1="10" x2="50" y2="25"/><line x1="50" y1="75" x2="50" y2="90"/>
            <line x1="10" y1="50" x2="25" y2="50"/><line x1="75" y1="50" x2="90" y2="50"/>
            <line x1="21" y1="21" x2="31" y2="31"/><line x1="69" y1="69" x2="79" y2="79"/>
            <line x1="79" y1="21" x2="69" y2="31"/><line x1="31" y1="69" x2="21" y2="79"/>
          </g></svg>
        </div>
      </div>
      <!-- Blood Sugar -->
      <div class="card">
        <div class="card-head">
          <div class="card-icon on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></div>
          <div><div class="card-title">Blood Sugar</div><div class="card-pct" id="sugarPct">2.3%</div></div>
        </div>
        <div class="meter-body">
          <div class="meter-bars" id="sugarBars"></div>
          <div class="meter-readout"><div class="big" id="sugarValue">120</div><div class="small">/160</div></div>
        </div>
      </div>
      <!-- Blood Pressure -->
      <div class="card">
        <div class="card-head">
          <div class="card-icon on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12z"/></svg></div>
          <div><div class="card-title">Blood Pressure</div><div class="card-pct" id="bpPct">0.4%</div></div>
        </div>
        <div class="wave-body">
          <svg viewBox="0 0 200 60" preserveAspectRatio="none"><polyline id="bpWave" points="" fill="none" stroke="#2b5cff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <div class="meter-readout"><div class="big" id="bpValue">80</div><div class="small">/120</div></div>
        </div>
      </div>
    </div>

    <h2 class="section-label">Heart Rate</h2>
    <div class="hr-panel">
      <div class="hr-top"><span class="hr-value" id="hrBig">92</span><span class="hr-unit">Avg bpm</span></div>
      <div id="hrCanvasWrap">
        <canvas id="hrCanvas" height="220"></canvas>
        <div id="hrTooltip"></div>
      </div>
    </div>
  </div>

  <!-- 3D BODY PANEL -->
  <div class="body-panel">
    <div class="body-panel-head">
      <h3>Body Scan · Live</h3>
      <span class="tag" id="scanTag">3 signals tracked</span>
    </div>
    <div id="three-container">
      <div class="hotspot-label" id="hotLabel"></div>
    </div>
    <div class="drag-hint">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg>
      drag to rotate · click a point
    </div>
    <div class="oxygen-card">
      <div class="oxygen-top">
        <svg width="34" height="34" viewBox="0 0 36 36">
          <path stroke="#e4e8f0" stroke-width="4" fill="none" d="M18 2 a16 16 0 1 1 0 32 a16 16 0 1 1 0 -32"/>
          <path id="oxyRing" stroke="#2b5cff" stroke-width="4" fill="none" stroke-linecap="round"
                stroke-dasharray="70,100" d="M18 2 a16 16 0 1 1 0 32 a16 16 0 1 1 0 -32"/>
        </svg>
        <span>Oxygen Level<br><b id="oxyValue">95%</b></span>
      </div>
      <div class="oxy-bars" id="oxyBars"></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============ LIVE VITALS SIMULATION ============ */
const state = {
  temp: 36.6, sugar: 120, sysBP: 120, diaBP: 80, oxygen: 95,
  hr: 92
};

function jitter(v, amt, min, max){
  let n = v + (Math.random()-0.5)*amt;
  return Math.max(min, Math.min(max, n));
}

function renderBars(container, count, activeIndex){
  container.innerHTML='';
  for(let i=0;i<count;i++){
    const b = document.createElement('div');
    b.className = 'bar' + (i===activeIndex ? ' active':'');
    b.style.height = (10 + Math.random()*22) + 'px';
    container.appendChild(b);
  }
}
renderBars(document.getElementById('sugarBars'), 14, 10);

function drawBPWave(){
  const pts = [];
  const w=200,h=60,mid=30;
  for(let x=0;x<=w;x+=4){
    const t = x/10;
    const y = mid - Math.sin(t)*10 * Math.exp(-((t%6)-1)*((t%6)-1)/2) - (Math.random()-0.5)*2;
    pts.push(`${x},${y.toFixed(1)}`);
  }
  document.getElementById('bpWave').setAttribute('points', pts.join(' '));
}
drawBPWave();

function renderOxyBars(){
  const el = document.getElementById('oxyBars');
  el.innerHTML='';
  const heights=[60,90,45,100,70];
  heights.forEach(h=>{
    const i=document.createElement('i');
    i.style.height = h+'%';
    el.appendChild(i);
  });
}
renderOxyBars();

function updateOxyRing(pct){
  document.getElementById('oxyRing').setAttribute('stroke-dasharray', `${pct},100`);
}
updateOxyRing(state.oxygen);

function tickVitals(){
  state.temp = jitter(state.temp, 0.15, 35.8, 37.6);
  state.sugar = jitter(state.sugar, 4, 80, 160);
  state.sysBP = jitter(state.sysBP, 3, 100, 140);
  state.diaBP = jitter(state.diaBP, 2, 65, 95);
  state.oxygen = jitter(state.oxygen, 1, 92, 99);

  document.getElementById('tempValue').textContent = state.temp.toFixed(1) + '°';
  document.getElementById('sugarValue').textContent = Math.round(state.sugar);
  document.getElementById('bpValue').textContent = Math.round(state.diaBP);
  document.getElementById('oxyValue').textContent = Math.round(state.oxygen) + '%';
  updateOxyRing(Math.round(state.oxygen));
  renderOxyBars();
  renderBars(document.getElementById('sugarBars'), 14, Math.floor(Math.random()*14));
  drawBPWave();

  document.getElementById('tempPct').textContent = (Math.random()*2+0.8).toFixed(1)+'%';
  document.getElementById('sugarPct').textContent = (Math.random()*3+1).toFixed(1)+'%';
  document.getElementById('bpPct').textContent = (Math.random()*1+0.2).toFixed(1)+'%';
}
setInterval(tickVitals, 3200);

/* ============ HEART RATE CHART (canvas, interactive) ============ */
const hrLabels = ['9:00','9:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00'];
let hrData = [95,82,70,64,78,88,95,72,58,52,60,84,78];
const hrCanvas = document.getElementById('hrCanvas');
const hrCtx = hrCanvas.getContext('2d');
const hrTooltip = document.getElementById('hrTooltip');
const hrBig = document.getElementById('hrBig');

function resizeHrCanvas(){
  const wrap = document.getElementById('hrCanvasWrap');
  hrCanvas.width = wrap.clientWidth * devicePixelRatio;
  hrCanvas.height = 220 * devicePixelRatio;
  hrCanvas.style.width = wrap.clientWidth + 'px';
  hrCanvas.style.height = '220px';
  drawHR();
}

let hoverIndex = -1;
function drawHR(){
  const ctx = hrCtx;
  const W = hrCanvas.width, H = hrCanvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const w = W/devicePixelRatio, h = H/devicePixelRatio;
  const padL = 40, padR = 10, padT = 10, padB = 26;
  const plotW = w - padL - padR, plotH = h - padT - padB;
  const minV = 50, maxV = 125;

  // grid + y labels
  ctx.strokeStyle = '#eef0f5';
  ctx.fillStyle = '#99a1b3';
  ctx.font = '11px Inter';
  ctx.textAlign='right';
  [60,80,100,120].forEach(v=>{
    const y = padT + plotH - ((v-minV)/(maxV-minV))*plotH;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(w-padR, y); ctx.stroke();
    ctx.fillText(v, padL-10, y+4);
  });

  const n = hrData.length;
  const stepX = plotW/(n-1===0?1:n-1);
  const barW = 8;

  hrData.forEach((v,i)=>{
    const x = padL + i*stepX;
    const yTop = padT + plotH - ((v-minV)/(maxV-minV))*plotH;
    const yBase = padT + plotH;
    const isHover = i===hoverIndex;
    ctx.strokeStyle = isHover ? '#2b5cff' : (v>85 ? '#2b5cff' : '#d8dee9');
    ctx.lineWidth = barW;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x, yBase);
    ctx.lineTo(x, yTop);
    ctx.stroke();

    if(isHover){
      ctx.beginPath();
      ctx.fillStyle = '#2b5cff';
      ctx.arc(x, yTop, 5, 0, Math.PI*2);
      ctx.fill();
    }
  });

  // x labels (every other)
  ctx.textAlign = 'center';
  ctx.fillStyle = '#99a1b3';
  hrLabels.forEach((l,i)=>{
    if(i % 2 !== 0) return;
    const x = padL + i*stepX;
    ctx.fillText(l, x, h-6);
  });
  ctx.restore();
}

function hrIndexFromX(px){
  const wrap = document.getElementById('hrCanvasWrap');
  const w = wrap.clientWidth;
  const padL = 40, padR = 10;
  const plotW = w - padL - padR;
  const n = hrData.length;
  const stepX = plotW/(n-1);
  const i = Math.round((px - padL)/stepX);
  return Math.max(0, Math.min(n-1, i));
}

hrCanvas.addEventListener('mousemove', (e)=>{
  const rect = hrCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const i = hrIndexFromX(x);
  if(i !== hoverIndex){
    hoverIndex = i;
    drawHR();
  }
  const wrap = document.getElementById('hrCanvasWrap');
  const padL = 40, padR = 10;
  const plotW = wrap.clientWidth - padL - padR;
  const stepX = plotW/(hrData.length-1);
  const px = padL + i*stepX;
  hrTooltip.style.left = px + 'px';
  hrTooltip.style.top = '0px';
  hrTooltip.textContent = `${hrLabels[i]} · ${hrData[i]} bpm`;
  hrTooltip.style.opacity = 1;
});
hrCanvas.addEventListener('mouseleave', ()=>{
  hoverIndex=-1; hrTooltip.style.opacity=0; drawHR();
});

window.addEventListener('resize', resizeHrCanvas);
resizeHrCanvas();

setInterval(()=>{
  hrData.shift();
  const last = hrData[hrData.length-1];
  const next = Math.max(52, Math.min(120, Math.round(jitter(last, 14, 52, 120))));
  hrData.push(next);
  hrBig.textContent = Math.round(hrData.reduce((a,b)=>a+b,0)/hrData.length);
  drawHR();
}, 2600);

/* ============ THREE.JS 3D BODY ============ */
const container = document.getElementById('three-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(35, container.clientWidth/container.clientHeight, 0.1, 100);
camera.position.set(0, 0.3, 7);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

// lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const key = new THREE.DirectionalLight(0xffffff, 0.9);
key.position.set(3, 5, 4);
scene.add(key);
const rim = new THREE.DirectionalLight(0x8fb0ff, 0.5);
rim.position.set(-4, 2, -3);
scene.add(rim);

// materials
const skinMat = new THREE.MeshStandardMaterial({ color:0xdfe4ee, roughness:0.55, metalness:0.05 });
const skinMat2 = new THREE.MeshStandardMaterial({ color:0xd3d9e6, roughness:0.6, metalness:0.05 });

const figure = new THREE.Group();

// helper: capsule-like shape from cylinder + two spheres (r128 safe, no CapsuleGeometry)
function limb(radiusTop, radiusBottom, length, mat){
  const g = new THREE.Group();
  const cyl = new THREE.Mesh(new THREE.CylinderGeometry(radiusTop, radiusBottom, length, 20), mat);
  g.add(cyl);
  const sTop = new THREE.Mesh(new THREE.SphereGeometry(radiusTop, 20, 20), mat);
  sTop.position.y = length/2;
  g.add(sTop);
  const sBot = new THREE.Mesh(new THREE.SphereGeometry(radiusBottom, 20, 20), mat);
  sBot.position.y = -length/2;
  g.add(sBot);
  return g;
}

// head
const head = new THREE.Mesh(new THREE.SphereGeometry(0.62, 32, 32), skinMat);
head.position.y = 3.05;
head.scale.set(0.86,1.05,0.92);
figure.add(head);

// neck
const neck = limb(0.22,0.26,0.35, skinMat2);
neck.position.y = 2.55;
figure.add(neck);

// torso (built from stacked spheres/cylinder for an organic silhouette)
const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.62, 0.46, 1.9, 24), skinMat);
torso.position.y = 1.5;
figure.add(torso);
const chest = new THREE.Mesh(new THREE.SphereGeometry(0.66, 24, 24), skinMat);
chest.position.y = 2.25; chest.scale.set(1,0.7,0.8);
figure.add(chest);
const pelvis = new THREE.Mesh(new THREE.SphereGeometry(0.5, 24,24), skinMat2);
pelvis.position.y = 0.55; pelvis.scale.set(1.05,0.6,0.8);
figure.add(pelvis);

// arms
const armL = limb(0.16,0.13,1.55, skinMat2);
armL.position.set(0.86, 1.75, 0);
armL.rotation.z = 0.22;
figure.add(armL);
const foreL = limb(0.13,0.11,1.35, skinMat2);
foreL.position.set(1.22, 0.55, 0.05);
foreL.rotation.z = 0.1;
figure.add(foreL);

const armR = limb(0.16,0.13,1.55, skinMat2);
armR.position.set(-0.86, 1.75, 0);
armR.rotation.z = -0.22;
figure.add(armR);
const foreR = limb(0.13,0.11,1.35, skinMat2);
foreR.position.set(-1.22, 0.55, 0.05);
foreR.rotation.z = -0.1;
figure.add(foreR);

// legs
const legL = limb(0.24,0.17,1.9, skinMat);
legL.position.set(0.32, -1.0, 0);
figure.add(legL);
const shinL = limb(0.17,0.12,1.7, skinMat);
shinL.position.set(0.32, -2.75, 0.05);
figure.add(shinL);

const legR = limb(0.24,0.17,1.9, skinMat);
legR.position.set(-0.32, -1.0, 0);
figure.add(legR);
const shinR = limb(0.17,0.12,1.7, skinMat);
shinR.position.set(-0.32, -2.75, 0.05);
figure.add(shinR);

figure.scale.set(0.85,0.85,0.85);
figure.position.y = -0.2;
scene.add(figure);

// subtle ground shadow via a flat glow disc
const groundGeo = new THREE.CircleGeometry(2.2, 32);
const groundMat = new THREE.MeshBasicMaterial({ color:0xdfe6f5, transparent:true, opacity:0.4 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.y = -3.15;
scene.add(ground);

// ---- hotspots ----
const hotspotDefs = [
  { pos: new THREE.Vector3(0.55, 1.95, 0.62), label:'Chest', value:()=>`SpO₂ ${Math.round(state.oxygen)}%` },
  { pos: new THREE.Vector3(0, 1.15, 0.62), label:'Abdomen', value:()=>`Core temp ${state.temp.toFixed(1)}°` },
  { pos: new THREE.Vector3(-0.5, 0.65, 0.5), label:'Left Hip', value:()=>`BP ${Math.round(state.sysBP)}/${Math.round(state.diaBP)}` },
  { pos: new THREE.Vector3(0.5, 0.65, 0.5), label:'Right Hip', value:()=>`Glucose ${Math.round(state.sugar)} mg/dL` },
];

const hotspotMeshes = [];
const pulseMat = new THREE.MeshBasicMaterial({ color:0x2b5cff });
hotspotDefs.forEach(def=>{
  const m = new THREE.Mesh(new THREE.SphereGeometry(0.075, 16,16), pulseMat);
  m.position.copy(def.pos);
  m.userData = def;
  figure.add(m);
  hotspotMeshes.push(m);

  // ring halo
  const ring = new THREE.Mesh(new THREE.RingGeometry(0.09,0.13,24), new THREE.MeshBasicMaterial({color:0x2b5cff, transparent:true, opacity:0.35, side:THREE.DoubleSide}));
  ring.position.copy(def.pos);
  ring.userData.isRing = true;
  figure.add(ring);
  def.ring = ring;
});

// raycasting for click + hover
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const hotLabel = document.getElementById('hotLabel');
let activeHotspot = null;

function screenPosOf(vec3World){
  const v = vec3World.clone().project(camera);
  const rect = container.getBoundingClientRect();
  return {
    x: (v.x*0.5+0.5) * rect.width,
    y: (-v.y*0.5+0.5) * rect.height
  };
}

function showLabel(def){
  const worldPos = new THREE.Vector3();
  def.matchedMesh.getWorldPosition(worldPos);
  const s = screenPosOf(worldPos);
  hotLabel.style.left = s.x + 'px';
  hotLabel.style.top = s.y + 'px';
  hotLabel.innerHTML = `<b>${def.label}</b><br>${def.value()}`;
  hotLabel.classList.add('show');
}

function pickAt(clientX, clientY){
  const rect = container.getBoundingClientRect();
  mouse.x = ((clientX-rect.left)/rect.width)*2-1;
  mouse.y = -((clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(hotspotMeshes);
  return intersects.length ? intersects[0].object : null;
}

container.addEventListener('click', (e)=>{
  const hit = pickAt(e.clientX, e.clientY);
  if(hit){
    activeHotspot = hit.userData;
    activeHotspot.matchedMesh = hit;
    showLabel(activeHotspot);
  } else {
    hotLabel.classList.remove('show');
    activeHotspot = null;
  }
});

// drag to rotate
let isDragging = false, prevX = 0, targetRotY = 0.35, currentRotY = 0.35;
container.addEventListener('pointerdown', (e)=>{ isDragging = true; prevX = e.clientX; });
window.addEventListener('pointerup', ()=>{ isDragging = false; });
window.addEventListener('pointermove', (e)=>{
  if(!isDragging) return;
  const dx = e.clientX - prevX;
  prevX = e.clientX;
  targetRotY += dx * 0.006;
});

function resizeThree(){
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
  renderer.setSize(w,h);
}
window.addEventListener('resize', resizeThree);

let t = 0;
function animate(){
  requestAnimationFrame(animate);
  t += 0.016;
  currentRotY += (targetRotY - currentRotY) * 0.08;
  if(!isDragging) targetRotY += 0.0018; // gentle auto-rotate
  figure.rotation.y = currentRotY;

  hotspotDefs.forEach((def,i)=>{
    const pulse = 1 + Math.sin(t*3 + i)*0.25;
    hotspotMeshes[i].scale.setScalar(pulse);
    def.ring.scale.setScalar(1 + Math.sin(t*3+i)*0.15);
    def.ring.lookAt(camera.position);
  });

  if(activeHotspot && activeHotspot.matchedMesh){
    showLabel(activeHotspot);
  }

  renderer.render(scene, camera);
}
animate();
resizeThree();
</script>
